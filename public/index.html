<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Reach: Multiverse</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: #05010d;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            color: #fff; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
        }
        #gameContainer {
            position: relative;
            width: 100%; height: 100%;
            max-width: 850px; max-height: 480px;
            aspect-ratio: 850 / 480;
            box-shadow: 0 0 30px #7d12ff;
        }
        canvas {
            width: 100%; height: 100%;
            display: block;
            background: #000;
        }
        /* Экран предупреждения о повороте */
        #rotateWarning {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b0214; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }
        #rotateWarning .icon { font-size: 50px; margin-bottom: 20px; animation: rotateAnim 2s infinite; }
        @keyframes rotateAnim {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
        @media (orientation: portrait) {
            #rotateWarning { display: flex; }
        }
        /* Мобильное управление */
        #mobileControls {
            position: absolute; bottom: 15px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px;
            pointer-events: none; z-index: 10;
        }
        .btn-group { display: flex; gap: 15px; pointer-events: auto; }
        .btn {
            width: 65px; height: 65px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%; color: white;
            font-size: 28px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn:active { background: rgba(182, 36, 255, 0.6); border-color: #b624ff; }
        /* Скрытие кнопок на ПК */
        @media (pointer: fine) { #mobileControls { display: none; } }
    </style>
</head>
<body>

    <div id="rotateWarning">
        <div class="icon">📱🔄</div>
        <h2>Пожалуйста, переверните экран</h2>
        <p>Для комфортной игры необходим альбомный (горизонтальный) режим.</p>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="850" height="480"></canvas>
        
        <div id="mobileControls">
            <div class="btn-group">
                <div class="btn" id="btnLeft">←</div>
                <div class="btn" id="btnRight">→</div>
            </div>
            <div class="btn-group">
                <div class="btn" id="btnJump">▲</div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
