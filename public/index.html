<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Reach: Pixel Universe</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: #05010d;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            color: #fff; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
        }
        #gameContainer {
            position: relative;
            width: 100%; height: 100%;
            max-width: 850px; max-height: 480px;
            aspect-ratio: 850 / 480;
            box-shadow: 0 0 30px #7d12ff;
            background: #000;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* Стили игрового Лобби */
        #lobbyOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 2, 20, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; padding: 20px; text-align: center;
        }
        #lobbyOverlay h1 { font-size: 32px; color: #b624ff; margin-bottom: 10px; text-shadow: 0 0 15px #b624ff; }
        #lobbyOverlay p { font-size: 16px; color: #8e8d9a; margin-bottom: 25px; line-height: 1.5; }
        #startBtn {
            padding: 14px 40px; font-size: 20px; font-family: inherit; font-weight: bold;
            background: #b624ff; color: white; border: 3px solid #df8eff; border-radius: 5px;
            cursor: pointer; box-shadow: 0 0 15px #b624ff; transition: 0.2s;
        }
        #startBtn:hover { background: #df8eff; box-shadow: 0 0 25px #df8eff; }

        /* Поворот экрана на мобильных устройствах */
        #rotateWarning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b0214; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        @media (orientation: portrait) { #rotateWarning { display: flex; } }

        /* Приподнятые мобильные кнопки управления */
        #mobileControls {
            position: absolute; bottom: 50px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 35px;
            pointer-events: none; z-index: 10;
        }
        .btn-group { display: flex; gap: 20px; pointer-events: auto; }
        .btn {
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; color: white; font-size: 32px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
        }
        .btn:active { background: rgba(182, 36, 255, 0.7); border-color: #b624ff; }
        
        /* Скрываем кнопки на компьютерах, где есть мышь и клавиатура */
        @media (pointer: fine) { #mobileControls { display: none; } }
    </style>
</head>
<body>

    <div id="rotateWarning">
        <h2 style="text-align:center;">📱🔄<br><br>Пожалуйста, переверните экран<br>в горизонтальный режим</h2>
    </div>

    <div id="gameContainer">
        <div id="lobbyOverlay">
            <h1>COSMIC REACH: MULTIVERSE</h1>
            <p id="playerCount">Подключение к серверу... Ожидайте</p>
            <button id="startBtn" style="display:none;">ГОТОВ К СТАРТУ</button>
        </div>

        <canvas id="gameCanvas" width="850" height="480"></canvas>
        
        <div id="mobileControls">
            <div class="btn-group">
                <div class="btn" id="btnLeft">←</div>
                <div class="btn" id="btnRight">→</div>
            </div>
            <div class="btn-group">
                <div class="btn" id="btnJump">▲</div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
